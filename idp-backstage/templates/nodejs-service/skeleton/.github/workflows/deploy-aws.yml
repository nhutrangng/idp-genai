name: "AWS Infrastructure Provisioning"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  provision-aws:
    name: "Run Terraform on AWS"
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write 

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: {% raw %}${{ vars.AWS_OIDC_ROLE_ARN }}{% endraw %}
          aws-region: ap-southeast-1

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket={% raw %}${{ vars.TF_STATE_BUCKET }}{% endraw %}" \
            -backend-config="key={% raw %}${{ github.event.repository.name }}{% endraw %}/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Terraform Output (public ip)
        id: tf_output
        run: echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

      - name: Notify Bot
        if: success()
        env:
          BOT_CALLBACK_URL: ${{ '${{ secrets.BOT_CALLBACK_URL }}' }}
          SLACK_CHANNEL_ID: ${{ '${{ secrets.SLACK_CHANNEL_ID }}' }}
        run: |
          if [ -z "$BOT_CALLBACK_URL" ]; then
            echo "BOT_CALLBACK_URL is not set" && exit 1
          fi
          public_ip=$(terraform output -raw public_ip 2>/dev/null || echo "N/A")
          payload=$(printf '{"project_name":"%s","status":"success","resource_url_or_ip":"%s","slack_channel_id":"%s"}' \
            "{% raw %}${{ github.event.repository.name }}{% endraw %}" \
            "$public_ip" \
            "$SLACK_CHANNEL_ID")
          curl -sS -X POST "$BOT_CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
        