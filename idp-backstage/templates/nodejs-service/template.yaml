apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nodejs-service-template
  title: Node.js Service
  description: Tạo dự án Node.js tích hợp sẵn AWS Terraform và GitHub Actions
spec:
  owner: user@example.com
  type: service

  parameters:
    - title: Provide Project Details
      required:
        - name
      properties:
        name:
          title: Tên Repository
          type: string
          description: Tên dự án sẽ được tạo trên GitHub (Ví dụ demo-aws-server)
          ui:autofocus: true

  steps:
    - id: fetch-base
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}

    - id: publish
      name: Publish to GitHub Organization
      action: publish:github
      input:
        description: Project ${{ parameters.name }} auto-generated by IDP
        repoUrl: github.com?owner=goldenpoppy-study&repo=${{ parameters.name }}
        repoVisibility: public